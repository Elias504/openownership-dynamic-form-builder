---
name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: yamllint .

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: ESLint
        run: npm run lint
        working-directory: frontend

  lint-kotlin:
    name: Lint Kotlin
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
      - name: Spotless check
        run: ./mvnw --no-transfer-progress spotless:check
        working-directory: backend

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: formbuilder
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changeme
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d formbuilder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '23'
          cache: maven
      - name: Run tests
        run: ./mvnw --no-transfer-progress test
        working-directory: backend

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Start services
        run: docker compose --env-file .env.e2e -f compose.yaml -f compose.e2e.yml up -d --build

      - name: Wait for frontend
        run: |
          echo "Waiting for frontend to be ready..."
          for i in $(seq 1 40); do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "Frontend ready after ${i} attempts"
              exit 0
            fi
            echo "Attempt $i/40 — retrying in 5s"
            sleep 5
          done
          echo "Frontend did not become ready in time"
          docker compose --env-file .env.e2e -f compose.yaml -f compose.e2e.yml logs
          exit 1

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
